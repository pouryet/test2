<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقعیت اضطراری</title>
    <style>
        body { font-family: Tahoma; direction: rtl; text-align: center; padding: 20px; background: #111; color: #eee; }
        #status { margin-top: 30px; font-size: 18px; }
    </style>
</head>
<body>
    <h2>در حال دریافت موقعیت...</h2>
    <div id="status"></div>

    <script>
        // ====== تنظیمات ======
        const FORM_ENDPOINT = 'https://formspree.io/f/mpqevqkd'; // ← endpoint خودت
        // ====================

        const statusEl = document.getElementById('status');

        function updateStatus(text, isError = false) {
            statusEl.textContent = text;
            if (isError) statusEl.style.color = '#f66';
            else statusEl.style.color = '#6f6';
        }

        // ارسال موقعیت GPS (دقیق)
        async function sendGPS(lat, lng, accuracy) {
            const payload = {
                lat: lat,
                lng: lng,
                accuracy: accuracy,
                method: 'gps',
                time: new Date().toLocaleString('fa-IR', { timeZone: 'Asia/Tehran' })
            };
            await sendToServer(payload);
        }

        // ارسال IP (پشتیبان)
        async function sendIP(ip) {
            const payload = {
                ip: ip,
                method: 'ip',
                time: new Date().toLocaleString('fa-IR', { timeZone: 'Asia/Tehran' })
            };
            await sendToServer(payload);
        }

        // ارسال مشترک به Formspree
        async function sendToServer(payload) {
            try {
                const response = await fetch(FORM_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (response.ok) {
                    updateStatus(`✅ موقعیت با روش ${payload.method} ارسال شد.`);
                } else {
                    updateStatus(`❌ خطای سرور ثبت (${response.status})`, true);
                }
            } catch (err) {
                updateStatus('❌ خطا در اتصال به سرویس ثبت.', true);
            }
        }

        // گرفتن IP عمومی (فقط IP، بدون مختصات)
        async function getPublicIP() {
            try {
                const ctrl = new AbortController();
                setTimeout(() => ctrl.abort(), 4000);
                // سرویس قابل اعتماد در ایران
                const resp = await fetch('https://api.ip.sb/geoip', { signal: ctrl.signal });
                if (!resp.ok) throw new Error('status ' + resp.status);
                const data = await resp.json();
                return data.ip; // فقط رشته IP
            } catch (e) {
                console.warn('IP service failed', e.message);
                return null;
            }
        }

        // ====== GPS (دست‌نخورده) ======
        function tryGPS() {
            updateStatus('📡 در حال جستجوی ماهواره...');

            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    sendGPS(
                        pos.coords.latitude,
                        pos.coords.longitude,
                        `دقت ${Math.round(pos.coords.accuracy)} متر`
                    );
                },
                async (err) => {
                    console.warn('GPS ناموفق', err.message);
                    updateStatus('📍 استفاده از IP...');
                    const ip = await getPublicIP();
                    if (ip) {
                        await sendIP(ip);
                    } else {
                        updateStatus('❌ نه GPS در دسترس است و نه IP.', true);
                    }
                },
                {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 0
                }
            );
        }

        tryGPS();
    </script>
</body>
</html>
